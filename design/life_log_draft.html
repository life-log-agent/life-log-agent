<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>life_log — 화면 초안</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #FAF7F2; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-entry.jsx"></script>
<script type="text/babel" src="screens-flow.jsx"></script>
<script type="text/babel" src="screens-results.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const W = 390, H = 844;

  function App() {
    return (
      <DesignCanvas title="life_log — 핵심 흐름 화면 초안">
        <DCSection id="entry" title="1 · 진입" subtitle="온보딩 → 첫 화면 (빈 상태 / 기록 있음)">
          <DCArtboard id="onb"  label="로그인 · 온보딩"   width={W} height={H}><ScreenOnboarding /></DCArtboard>
          <DCArtboard id="home-empty" label="홈 · 빈 상태" width={W} height={H}><ScreenHomeEmpty /></DCArtboard>
          <DCArtboard id="home" label="홈 · 기록 있음 (1차 화면)" width={W} height={H}><ScreenHome /></DCArtboard>
        </DCSection>

        <DCSection id="flow" title="2 · 입력 → 처리" subtitle="업로드 → 처리 상태(진행 / 실패·재시도)">
          <DCArtboard id="upload" label="업로드 (입력)" width={W} height={H}><ScreenUpload /></DCArtboard>
          <DCArtboard id="proc" label="처리 상태 · 진행" width={W} height={H}><ScreenProcessing /></DCArtboard>
          <DCArtboard id="proc-fail" label="처리 상태 · 실패 / 재시도" width={W} height={H}><ScreenProcessingFailed /></DCArtboard>
        </DCSection>

        <DCSection id="result" title="3 · 결과 → 검색" subtitle="타임라인 → 검색(답변·근거·다음 행동) → 빈 결과 → 상세">
          <DCArtboard id="timeline" label="분류 결과 · 타임라인" width={W} height={H}><ScreenTimeline /></DCArtboard>
          <DCArtboard id="search" label="검색 · RAG 답변" width={W} height={H}><ScreenSearch /></DCArtboard>
          <DCArtboard id="search-empty" label="검색 · 결과 0건" width={W} height={H}><ScreenSearchEmpty /></DCArtboard>
          <DCArtboard id="detail" label="항목 상세" width={W} height={H}><ScreenDetail /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
